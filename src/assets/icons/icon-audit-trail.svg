<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="36" stroke="#C9A24C" stroke-width="1.5"/>

  <!-- Document body with folded top-right corner -->
  <path d="M25 18 L25 62 L55 62 L55 27 L46 18 Z" stroke="#C9A24C" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Fold crease -->
  <polyline points="46,18 46,27 55,27" stroke="#C9A24C" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Timeline entry 1 — dot + label line -->
  <circle cx="33" cy="35" r="2" fill="#C9A24C"/>
  <line x1="38" y1="35" x2="51" y2="35" stroke="#C9A24C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Connector between entries 1 and 2 -->
  <line x1="33" y1="37" x2="33" y2="41" stroke="#C9A24C" stroke-width="1" stroke-linecap="round"/>

  <!-- Timeline entry 2 -->
  <circle cx="33" cy="43" r="2" fill="#C9A24C"/>
  <line x1="38" y1="43" x2="51" y2="43" stroke="#C9A24C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Connector between entries 2 and 3 -->
  <line x1="33" y1="45" x2="33" y2="49" stroke="#C9A24C" stroke-width="1" stroke-linecap="round"/>

  <!-- Timeline entry 3 — shorter line suggests a partial/recent entry -->
  <circle cx="33" cy="51" r="2" fill="#C9A24C"/>
  <line x1="38" y1="51" x2="46" y2="51" stroke="#C9A24C" stroke-width="1.5" stroke-linecap="round"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="36" stroke="#C9A24C" stroke-width="1.5"/>

  <!-- Source collection A (top left) -->
  <circle cx="26" cy="26" r="6" stroke="#C9A24C" stroke-width="1.5"/>

  <!-- Source collection B (top right) -->
  <circle cx="54" cy="26" r="6" stroke="#C9A24C" stroke-width="1.5"/>

  <!-- Flow lines from sources converging to the composed collection -->
